<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Avancerat Quiz</title>
    <link rel="stylesheet" href="css/quiz.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>JavaScript Avancerat</h1>
            <div class="header-nav">
                <a href="index.html" class="home-btn">← Startsidan</a>
            </div>
        </div>

        <div id="quiz-section">
            <div id="error-message" class="error-message hidden"></div>
            <div class="progress-bar">
                <div class="progress-fill" id="progress"></div>
            </div>

            <div class="quiz-toolbar">
    <div id="timer" class="timer">60:00</div>
    <div id="live-score" class="live-score">Poäng: 0 / ?</div>
</div>

            <div class="question-container">
                <div class="question-number" id="question-number"></div>
                <div class="question-text" id="question-text"></div>
                <div class="options" id="options"></div>
            </div>

            <div class="navigation">
                <button class="btn-secondary" id="prev-btn">Föregående</button>
                <button class="btn-primary" id="next-btn">Nästa</button>
            </div>
        </div>

        <div id="results-section" class="hidden">
            <div class="results-container">
                <h2>Quiz Avslutat!</h2>
                <div class="score" id="score"></div>
                <div class="score-percent" id="score-percent"></div>
                <div class="score-message" id="score-message"></div>
                <div id="timeout-info" class="timeout-info hidden"></div>
                <div class="results-actions">
                    <button class="btn-primary" id="restart-btn">Starta om quiz</button>
                    <a href="index.html" class="btn-link">Tillbaka till startsidan</a>
                </div>
            </div>

            <div class="review-section">
                <h2>Genomgång av svar</h2>
                <div id="review-list"></div>
            </div>
        </div>
    </div>

    <script src="js/quiz-engine.js"></script>
    <script src="js/js-avancerat.js"></script>
</body>
</html>
